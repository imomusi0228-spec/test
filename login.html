<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VRC Cast Companion - ログイン</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ログイン画面特有のオーバーライドスタイル */
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      min-height: 100vh;
      padding: 20px;
    }

    .login-card {
      width: 100%;
      max-width: 450px;
      background: var(--panel-bg);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--panel-highlight);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(255, 255, 255, 0.02);
      transition: var(--transition-smooth);
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(0, 240, 255, 0.03) 0%, transparent 60%);
      pointer-events: none;
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-logo {
      font-size: 3rem;
      margin-bottom: 10px;
      display: inline-block;
      filter: drop-shadow(0 0 10px var(--color-cyan));
      animation: logoGlow 2s ease-in-out infinite alternate;
    }

    @keyframes logoGlow {
      from { filter: drop-shadow(0 0 5px rgba(0, 240, 255, 0.4)); }
      to { filter: drop-shadow(0 0 15px rgba(0, 240, 255, 0.8)); }
    }

    .login-title {
      font-family: var(--font-eng), var(--font-main);
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 1px;
    }

    .login-subtitle {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-top: 5px;
    }

    /* タブ切り替え */
    .tabs-container {
      display: flex;
      border-bottom: 1px solid var(--panel-border);
      margin-bottom: 25px;
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-muted);
      padding: 12px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition-smooth);
      text-align: center;
      position: relative;
    }

    .tab-btn.active {
      color: var(--color-cyan);
      font-weight: 700;
    }

    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--color-cyan);
      box-shadow: 0 0 8px var(--color-cyan);
    }

    /* フォームスタイル */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .input-wrapper {
      position: relative;
    }

    .form-input {
      width: 100%;
      background: rgba(10, 10, 18, 0.5);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text-primary);
      font-size: 0.95rem;
      transition: var(--transition-smooth);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--color-cyan);
      box-shadow: 0 0 10px rgba(0, 240, 255, 0.15);
      background: rgba(10, 10, 18, 0.7);
    }

    /* ラジオボタングループ（登録タイプ） */
    .radio-group {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      background: rgba(10, 10, 18, 0.3);
      padding: 5px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.02);
    }

    .radio-option {
      flex: 1;
      position: relative;
    }

    .radio-option input[type="radio"] {
      display: none;
    }

    .radio-label {
      display: block;
      padding: 8px 12px;
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-muted);
      border-radius: 8px;
      cursor: pointer;
      transition: var(--transition-smooth);
    }

    .radio-option input[type="radio"]:checked + .radio-label {
      background: rgba(255, 255, 255, 0.05);
      color: var(--color-purple);
      font-weight: 700;
      box-shadow: inset 0 0 10px rgba(189, 0, 255, 0.15);
      border: 1px solid rgba(189, 0, 255, 0.3);
    }

    .action-btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      margin-top: 10px;
      cursor: pointer;
      border: none;
      background: linear-gradient(135deg, var(--color-cyan) 0%, var(--color-purple) 100%);
      color: #fff;
      box-shadow: var(--glow-cyan);
      transition: var(--transition-smooth);
    }

    .action-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 25px rgba(0, 240, 255, 0.5), 0 0 25px rgba(189, 0, 255, 0.5);
    }

    .action-btn:active {
      transform: translateY(1px);
    }

    .action-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .error-msg {
      color: var(--color-pink);
      font-size: 0.85rem;
      margin-top: 15px;
      text-align: center;
      display: none;
      padding: 10px;
      background: rgba(255, 0, 122, 0.1);
      border: 1px solid rgba(255, 0, 122, 0.2);
      border-radius: 8px;
    }

    .success-msg {
      color: var(--color-cyan);
      font-size: 0.85rem;
      margin-top: 15px;
      text-align: center;
      display: none;
      padding: 10px;
      background: rgba(0, 240, 255, 0.1);
      border: 1px solid rgba(0, 240, 255, 0.2);
      border-radius: 8px;
    }

    /* ローディングアニメーション */
    .loader {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      display: none;
    }

    /* リカバリーキーモーダルのスタイル */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(5, 5, 10, 0.85);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      animation: fadeIn 0.3s ease;
    }

    .modal-box {
      width: 100%;
      background: var(--panel-bg);
      border: 1px solid var(--panel-highlight);
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
      animation: slideUp 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .glass-panel {
      background: rgba(22, 22, 38, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(25px);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* 汎用ミニボタンスタイル */
    .btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text-primary);
      cursor: pointer;
      transition: var(--transition-smooth);
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 8px;
    }
    .btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.15);
    }
    .btn-secondary {
      background: rgba(0, 240, 255, 0.15);
      border-color: rgba(0, 240, 255, 0.3);
      color: var(--color-cyan);
    }
    .btn-secondary:hover {
      background: rgba(0, 240, 255, 0.25);
      box-shadow: var(--glow-cyan);
    }
  </style>
</head>
<body>
  <!-- 背景のネオン発光グラデーション -->
  <div class="ambient-glow bg-glow-1"></div>
  <div class="ambient-glow bg-glow-2"></div>

  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <span class="login-logo">📖</span>
        <h1 class="login-title">VRC Cast Companion</h1>
        <p class="login-subtitle">SaaS型マルチテナント顧客名簿システム</p>
      </div>

      <div class="tabs-container">
        <button id="tab-signin" class="tab-btn active" onclick="switchTab('signin')">サインイン</button>
        <button id="tab-signup" class="tab-btn" onclick="switchTab('signup')">新規アカウント作成</button>
      </div>

      <!-- 致命的な初期化エラー表示用（タブを切り替えても消えません） -->
      <div id="fatal-error-alert" class="error-msg" style="margin-bottom: 20px;"></div>

      <!-- 通常のエラー・成功メッセージ表示領域 -->
      <div id="error-alert" class="error-msg" style="margin-bottom: 20px;"></div>
      <div id="success-alert" class="success-msg" style="margin-bottom: 20px;"></div>

      <!-- 1. サインインフォーム -->
      <form id="form-signin" onsubmit="handleSignIn(event)">
        <div class="form-group">
          <label class="form-label" for="signin-username">ユーザーID（半角英数字・記号）</label>
          <input type="text" id="signin-username" class="form-input" placeholder="例: taro123" required autocomplete="username" pattern="^[a-zA-Z0-9_-]+$" title="半角英数字、ハイフン(-)、アンダーバー(_)のみ使用できます">
        </div>
        <div class="form-group">
          <label class="form-label" for="signin-password">パスワード</label>
          <input type="password" id="signin-password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" id="btn-signin-submit" class="action-btn">
          <span class="loading-text" id="signin-loading"><span class="loader"></span></span>
          ログイン
        </button>
      </form>

      <div id="signin-help-link" style="margin-top: 15px; text-align: center;">
        <a href="#" style="font-size: 0.85rem; color: var(--text-secondary); text-decoration: none; display: inline-flex; align-items: center; gap: 4px;" onclick="switchTab('reset')">
          🔑 パスワードを忘れた場合
        </a>
      </div>

      <!-- 3. パスワード再設定フォーム -->
      <form id="form-reset" style="display: none;" onsubmit="handleResetPassword(event)">
        <div class="form-group">
          <label class="form-label" for="reset-username">ユーザーID</label>
          <input type="text" id="reset-username" class="form-input" placeholder="例: taro123" required autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label" for="reset-recovery-key">リカバリーキー（復元コード）</label>
          <input type="text" id="reset-recovery-key" class="form-input" placeholder="RC-XXXX-XXXX-XXXX" required pattern="^RC-[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}$" title="RC-で始まる16文字の復元コードを入力してください">
        </div>
        <div class="form-group">
          <label class="form-label" for="reset-new-password">新しいパスワード（6文字以上）</label>
          <input type="password" id="reset-new-password" class="form-input" placeholder="••••••••" required autocomplete="new-password" minlength="6">
        </div>
        <button type="submit" id="btn-reset-submit" class="action-btn" style="background: linear-gradient(135deg, var(--color-cyan) 0%, var(--color-purple) 100%); box-shadow: var(--glow-purple);">
          <span class="loading-text" id="reset-loading"><span class="loader"></span></span>
          パスワードを再設定する
        </button>
        <div style="margin-top: 20px; text-align: center;">
          <a href="#" style="font-size: 0.8rem; color: var(--text-muted); text-decoration: none;" onclick="switchTab('signin')">
            ← ログイン画面に戻る
          </a>
        </div>
      </form>

      <!-- 2. 新規登録フォーム -->
      <form id="form-signup" style="display: none;" onsubmit="handleSignUp(event)">
        <!-- 登録タイプ選択 -->
        <label class="form-label">登録タイプ</label>
        <div class="radio-group">
          <div class="radio-option">
            <input type="radio" id="role-master" name="signup-role" value="master" checked onchange="toggleSignupFields()">
            <label for="role-master" class="radio-label">店舗オーナー</label>
          </div>
          <div class="radio-option">
            <input type="radio" id="role-cast" name="signup-role" value="cast" onchange="toggleSignupFields()">
            <label for="role-cast" class="radio-label">キャスト</label>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="signup-username">ユーザーID（半角英数字・3文字以上）</label>
          <input type="text" id="signup-username" class="form-input" placeholder="例: cast_hina" required autocomplete="username" pattern="^[a-zA-Z0-9_-]{3,}$" title="3文字以上の半角英数字、ハイフン(-)、アンダーバー(_)のみ使用できます">
        </div>
        <div class="form-group">
          <label class="form-label" for="signup-password">パスワード（6文字以上）</label>
          <input type="password" id="signup-password" class="form-input" placeholder="••••••••" required autocomplete="new-password" minlength="6">
        </div>
        <div class="form-group">
          <label class="form-label" for="signup-display-name">お名前（店舗での表示名）</label>
          <input type="text" id="signup-display-name" class="form-input" placeholder="例: ひな" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="signup-vrc-name">VRChat表示名</label>
          <input type="text" id="signup-vrc-name" class="form-input" placeholder="例: Hina_VRC">
        </div>

        <!-- 店舗オーナー用フィールド -->
        <div class="form-group" id="field-org-name">
          <label class="form-label" for="signup-org-name">新規店舗名（グループ名）</label>
          <input type="text" id="signup-org-name" class="form-input" placeholder="例: カフェ・ねこみみ" required>
        </div>

        <!-- キャスト用フィールド -->
        <div class="form-group" id="field-org-id" style="display: none;">
          <label class="form-label" for="signup-org-id">所属店舗ID（招待コード）</label>
          <input type="text" id="signup-org-id" class="form-input" placeholder="オーナーから共有されたUUID">
        </div>

        <button type="submit" id="btn-signup-submit" class="action-btn">
          <span class="loading-text" id="signup-loading"><span class="loader"></span></span>
          アカウント作成
        </button>
      </form>

      <!-- 手動接続設定（フォールバック用） -->
      <div class="db-manual-setup" style="margin-top: 25px; border-top: 1px solid var(--panel-border); padding-top: 15px; text-align: center;">
        <a href="#" id="toggle-manual-db" style="font-size: 0.8rem; color: var(--text-muted); display: inline-flex; align-items: center; gap: 5px; text-decoration: none;" onclick="toggleManualDb(event)">
          ⚙️ データベースを手動設定する (接続できない場合)
        </a>
        <div id="manual-db-form" style="display: none; margin-top: 15px; text-align: left; background: rgba(10,10,18,0.3); padding: 15px; border-radius: 12px; border: 1px solid var(--panel-border);">
          <p style="font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 10px; line-height: 1.4;">
            Vercelの環境設定（SUPABASE_URL 等）がまだ設定されていない場合は、手動でキーを設定して一時的に接続できます。
          </p>
          <div class="form-group" style="margin-bottom: 12px;">
            <label class="form-label" style="font-size: 0.75rem;" for="manual-url">Supabase URL または Project ID</label>
            <input type="text" id="manual-url" class="form-input" style="padding: 8px 12px; font-size: 0.85rem;" placeholder="https://xxx.supabase.co">
          </div>
          <div class="form-group" style="margin-bottom: 12px;">
            <label class="form-label" style="font-size: 0.75rem;" for="manual-key">Supabase anon public key</label>
            <input type="password" id="manual-key" class="form-input" style="padding: 8px 12px; font-size: 0.85rem;" placeholder="eyJhbGciOiJIUzI1Ni...">
          </div>
          <button type="button" class="action-btn" style="padding: 8px; font-size: 0.85rem; margin-top: 5px;" onclick="handleManualConnect()">接続情報を保存して適用</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    let supabaseClient = null;
    const DUMMY_PREFIX = "vrc-companion-"; // 他人のアドレスと衝突を防ぐための接頭辞
    const DUMMY_DOMAIN = "@gmail.com"; // DNS(MXレコード)チェックを通過するための実在するドメイン

    // 起動時に環境設定をAPIから取得して初期化
    document.addEventListener('DOMContentLoaded', async () => {
      await tryInitSupabase();
    });

    async function tryInitSupabase() {
      clearAlerts();
      document.getElementById('fatal-error-alert').style.display = 'none';

      try {
        let config = {};
        
        // 1. APIから設定取得
        try {
          const res = await fetch('/api/config');
          if (res.ok) {
            config = await res.json();
          }
        } catch (e) {
          console.warn('API config load failed, fallback to localStorage.');
        }
        
        let url = config.supabaseUrl || localStorage.getItem('supabase_url');
        let key = config.supabaseKey || localStorage.getItem('supabase_key');
        
        if (!url || !key) {
          throw new Error('Supabaseの接続キーが見つかりません。Vercelの環境変数(SUPABASE_URL, SUPABASE_KEY)を登録するか、下部の「手動設定」から入力してください。');
        }

        // Project IDが入力された場合はURL形式に補完
        if (url && !url.startsWith('http://') && !url.startsWith('https://')) {
          const cleanId = url.replace(/[^a-zA-Z0-9]/g, '');
          url = `https://${cleanId}.supabase.co`;
        }

        // Supabaseクライアントの初期化
        supabaseClient = window.supabase.createClient(url, key);
        
        // ボタンの無効化を解除
        document.getElementById('btn-signin-submit').disabled = false;
        document.getElementById('btn-signup-submit').disabled = false;

        // ログイン状態であれば自動でポータルへ
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
          // 接続URLとキーをlocalStorageに同期（app.jsとの互換用）
          localStorage.setItem('supabase_url', url);
          localStorage.setItem('supabase_key', key);
          window.location.href = 'portal.html';
        }
      } catch (err) {
        console.error(err);
        showFatalError(err.message);
        
        // エラー時は手動フォームに現在保存されている値をプリセットして入力しやすくする
        document.getElementById('manual-url').value = localStorage.getItem('supabase_url') || '';
        document.getElementById('manual-key').value = localStorage.getItem('supabase_key') || '';
        
        // ボタンを一時無効化
        document.getElementById('btn-signin-submit').disabled = true;
        document.getElementById('btn-signup-submit').disabled = true;
      }
    }

    // 手動設定アコーディオンの切り替え
    function toggleManualDb(e) {
      e.preventDefault();
      const form = document.getElementById('manual-db-form');
      if (form.style.display === 'none') {
        form.style.display = 'block';
      } else {
        form.style.display = 'none';
      }
    }

    // 手動設定の適用
    async function handleManualConnect() {
      const urlInput = document.getElementById('manual-url').value.trim();
      const keyInput = document.getElementById('manual-key').value.trim();

      if (!urlInput || !keyInput) {
        alert('URLとキーの両方を入力してください。');
        return;
      }

      localStorage.setItem('supabase_url', urlInput);
      localStorage.setItem('supabase_key', keyInput);
      
      alert('接続設定を保存しました。再接続を試みます。');
      
      // フォームを閉じて再初期化
      document.getElementById('manual-db-form').style.display = 'none';
      await tryInitSupabase();
    }

    // タブ切り替え
    function switchTab(tab) {
      clearAlerts();
      
      const tabSignin = document.getElementById('tab-signin');
      const tabSignup = document.getElementById('tab-signup');
      const formSignin = document.getElementById('form-signin');
      const formSignup = document.getElementById('form-signup');
      const formReset = document.getElementById('form-reset');
      const helpLink = document.getElementById('signin-help-link');

      if (tab === 'signin') {
        tabSignin.style.display = 'flex';
        tabSignup.style.display = 'flex';
        tabSignin.classList.add('active');
        tabSignup.classList.remove('active');
        formSignin.style.display = 'block';
        formSignup.style.display = 'none';
        formReset.style.display = 'none';
        helpLink.style.display = 'block';
      } else if (tab === 'signup') {
        tabSignin.style.display = 'flex';
        tabSignup.style.display = 'flex';
        tabSignin.classList.remove('active');
        tabSignup.classList.add('active');
        formSignin.style.display = 'none';
        formSignup.style.display = 'block';
        formReset.style.display = 'none';
        helpLink.style.display = 'none';
      } else if (tab === 'reset') {
        // 再設定画面：タブヘッダー自体を非表示にし、フォームだけを表示
        tabSignin.style.display = 'none';
        tabSignup.style.display = 'none';
        formSignin.style.display = 'none';
        formSignup.style.display = 'none';
        formReset.style.display = 'block';
        helpLink.style.display = 'none';
      }
    }

    // 登録タイプの表示切り替え
    function toggleSignupFields() {
      const isMaster = document.getElementById('role-master').checked;
      const orgNameField = document.getElementById('field-org-name');
      const orgIdField = document.getElementById('field-org-id');
      const orgNameInput = document.getElementById('signup-org-name');
      const orgIdInput = document.getElementById('signup-org-id');

      if (isMaster) {
        orgNameField.style.display = 'block';
        orgNameInput.required = true;
        orgIdField.style.display = 'none';
        orgIdInput.required = false;
      } else {
        orgNameField.style.display = 'none';
        orgNameInput.required = false;
        orgIdField.style.display = 'block';
        orgIdInput.required = true;
      }
    }

    // サインイン処理
    async function handleSignIn(e) {
      e.preventDefault();
      clearAlerts();
      
      const username = document.getElementById('signin-username').value.trim();
      const password = document.getElementById('signin-password').value;
      const submitBtn = document.getElementById('btn-signin-submit');
      const loading = document.getElementById('signin-loading');

      // ユーザーIDをダミーメールアドレス形式に変換 (大文字小文字による違いをなくすためtoLowerCase)
      const email = DUMMY_PREFIX + username.toLowerCase() + DUMMY_DOMAIN;

      try {
        setLoading(submitBtn, loading, true);
        
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email: email,
          password: password
        });

        if (error) throw error;

        // セッション情報をローカルストレージに同期保存（app.jsとの互換用）
        localStorage.setItem('supabase_url', supabaseClient.supabaseUrl);
        localStorage.setItem('supabase_key', supabaseClient.supabaseKey);

        showSuccess('ログインに成功しました！遷移します。');
        setTimeout(() => {
          window.location.href = 'portal.html';
        }, 1000);

      } catch (err) {
        showError('ログイン失敗: ユーザーIDまたはパスワードが違います。');
        setLoading(submitBtn, loading, false);
      }
    }

    // サインアップ（新規登録）処理
    async function handleSignUp(e) {
      e.preventDefault();
      clearAlerts();

      const username = document.getElementById('signup-username').value.trim();
      const password = document.getElementById('signup-password').value;
      const displayName = document.getElementById('signup-display-name').value.trim();
      const vrcName = document.getElementById('signup-vrc-name').value.trim();
      const isMaster = document.getElementById('role-master').checked;
      
      const submitBtn = document.getElementById('btn-signup-submit');
      const loading = document.getElementById('signup-loading');

      const payload = {
        username: username,
        password: password,
        display_name: displayName,
        vrc_name: vrcName,
        role: isMaster ? 'master' : 'cast'
      };

      if (isMaster) {
        payload.org_name = document.getElementById('signup-org-name').value.trim();
      } else {
        const orgId = document.getElementById('signup-org-id').value.trim();
        if (!orgId) {
          showError('キャスト登録には所属店舗ID（招待コード）が必要です。');
          return;
        }
        payload.org_id = orgId;
      }

      try {
        setLoading(submitBtn, loading, true);

        // 1. サーバーサイド登録API (/api/signup) を呼び出し
        const signupRes = await fetch('/api/signup', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        const result = await signupRes.json();
        if (!signupRes.ok) {
          throw new Error(result.error || 'アカウントの登録に失敗しました。');
        }

        const recoveryKey = result.recovery_key;

        // 2. 登録成功後、そのまま自動的にログイン処理を実行
        const email = DUMMY_PREFIX + username.toLowerCase() + DUMMY_DOMAIN;
        
        const { data: signinData, error: signinError } = await supabaseClient.auth.signInWithPassword({
          email: email,
          password: password
        });

        if (signinError) throw signinError;

        // セッション情報をローカルストレージに同期保存（app.jsとの互換用）
        localStorage.setItem('supabase_url', supabaseClient.supabaseUrl);
        localStorage.setItem('supabase_key', supabaseClient.supabaseKey);

        setLoading(submitBtn, loading, false);

        // 3. リカバリーキーモーダルを表示
        document.getElementById('display-recovery-key').textContent = recoveryKey;
        const recoveryModal = document.getElementById('recovery-modal');
        recoveryModal.style.display = 'flex';

        // 確認ボタンのイベント紐付け
        document.getElementById('btn-recovery-confirm').onclick = () => {
          recoveryModal.style.display = 'none';
          showSuccess('アカウントの作成および登録が完了しました！ポータルへ遷移します。');
          setTimeout(() => {
            window.location.href = 'portal.html';
          }, 800);
        };

      } catch (err) {
        showError('登録失敗: ' + err.message);
        setLoading(submitBtn, loading, false);
      }
    }

    // パスワード再設定処理
    async function handleResetPassword(e) {
      e.preventDefault();
      clearAlerts();

      const username = document.getElementById('reset-username').value.trim();
      const recoveryKey = document.getElementById('reset-recovery-key').value.trim();
      const newPassword = document.getElementById('reset-new-password').value;
      const submitBtn = document.getElementById('btn-reset-submit');
      const loading = document.getElementById('reset-loading');

      try {
        setLoading(submitBtn, loading, true);

        const res = await fetch('/api/reset-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            username: username,
            recovery_key: recoveryKey,
            new_password: newPassword
          })
        });

        const result = await res.json();
        if (!res.ok) {
          throw new Error(result.error || 'パスワードの再設定に失敗しました。');
        }

        showSuccess('パスワードが正常に更新されました！新しいパスワードでログインしてください。');
        setLoading(submitBtn, loading, false);
        
        // フォームをリセットしてログイン画面に戻す
        document.getElementById('form-reset').reset();
        setTimeout(() => {
          switchTab('signin');
        }, 2000);

      } catch (err) {
        showError('再設定失敗: ' + err.message);
        setLoading(submitBtn, loading, false);
      }
    }

    // リカバリーキーをクリップボードにコピー
    function copyRecoveryKey() {
      const keyText = document.getElementById('display-recovery-key').textContent;
      navigator.clipboard.writeText(keyText).then(() => {
        alert('リカバリーキーをコピーしました！安全な場所に保存してください。');
      }).catch(err => {
        console.error('Copy failed:', err);
        alert('コピーに失敗しました。直接ドラッグしてコピーしてください。');
      });
    }

    // ヘルパー関数
    function setLoading(button, loader, isLoading) {
      if (isLoading) {
        button.disabled = true;
        loader.style.display = 'inline-block';
      } else {
        button.disabled = false;
        loader.style.display = 'none';
      }
    }

    function showFatalError(msg) {
      const el = document.getElementById('fatal-error-alert');
      el.innerHTML = '⚠️ ' + msg;
      el.style.display = 'block';
    }

    function showError(msg) {
      const el = document.getElementById('error-alert');
      el.textContent = msg;
      el.style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showSuccess(msg) {
      const el = document.getElementById('success-alert');
      el.textContent = msg;
      el.style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function clearAlerts() {
      document.getElementById('error-alert').style.display = 'none';
      document.getElementById('success-alert').style.display = 'none';
    }
  </script>

  <!-- リカバリーキー表示モーダル -->
  <div id="recovery-modal" class="modal-overlay" style="display: none; z-index: 100;">
    <div class="modal-box glass-panel" style="max-width: 460px; padding: 35px; border-color: rgba(0, 240, 255, 0.2);">
      <div class="modal-header" style="border-bottom: none; padding-bottom: 0; text-align: center; display: block; position: relative;">
        <span style="font-size: 3rem; filter: drop-shadow(0 0 10px var(--color-cyan));">🔒</span>
        <h3 style="font-size: 1.4rem; color: var(--color-cyan); margin-top: 15px; font-weight: 700;">アカウント作成完了！</h3>
      </div>
      <div class="modal-body" style="text-align: center; margin-top: 15px;">
        <p style="font-size: 0.85rem; color: var(--text-primary); line-height: 1.6; margin-bottom: 20px;">
          パスワードを忘れた際、アカウントを救済するための大切な **リカバリーキー（復元コード）** です。<br>
          再発行はできませんので、必ず安全な場所にコピーして保管してください。
        </p>
        
        <div style="background: rgba(10, 10, 18, 0.6); border: 1px solid rgba(0, 240, 255, 0.3); border-radius: 12px; padding: 15px; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 10px;">
          <span id="display-recovery-key" style="font-family: monospace; font-size: 1.25rem; font-weight: 700; color: var(--color-cyan); letter-spacing: 1px;">RC-XXXX-XXXX-XXXX</span>
          <button onclick="copyRecoveryKey()" class="btn btn-secondary" style="padding: 6px 12px; font-size: 0.75rem; border-radius: 8px;">コピー</button>
        </div>
        
        <button id="btn-recovery-confirm" class="action-btn" style="margin-top: 0;">控えたのでポータルに進む ➡️</button>
      </div>
    </div>
  </div>
</body>
</html>
